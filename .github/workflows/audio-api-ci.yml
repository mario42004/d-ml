name: Audio API CI

on:
  push:
    paths:
      - ".github/workflows/audio-api-ci.yml"
      - "audio_scalogram_api/**"
  pull_request:
    paths:
      - ".github/workflows/audio-api-ci.yml"
      - "audio_scalogram_api/**"

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: mario42004/d-ml-audio-scalogram-api

jobs:
  test:
    name: Test audio API
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: audio_scalogram_api

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: audio_scalogram_api/requirements.txt

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends ffmpeg libsndfile1

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt pytest

      - name: Compile Python modules
        run: python -m py_compile app/main.py app/routers/*.py app/services/*.py app/core/*.py app/analysis_engine/*.py

      - name: Run tests
        run: PYTHONPATH=. pytest -q

  docker-build:
    name: Build Docker image
    runs-on: ubuntu-latest
    needs: test
    defaults:
      run:
        working-directory: audio_scalogram_api

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build image
        run: docker build -t audio-scalogram-api:ci .

  publish:
    name: Publish Docker image
    runs-on: ubuntu-latest
    needs:
      - test
      - docker-build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest
            type=sha,prefix=sha-

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: audio_scalogram_api
          file: audio_scalogram_api/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
